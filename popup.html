<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>T&C Decoder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px; min-height: 200px;
      background: #0a0a0f; color: #e2e8f0;
      font-family: 'Courier New', monospace; font-size: 13px;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px);
    }
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-bottom: 1px solid #1e1e2e; background: #0a0a0f;
    }
    .logo {
      width: 30px; height: 30px; border-radius: 6px;
      background: linear-gradient(135deg, #dc2626, #7f1d1d);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .header-text h1 { font-size: 13px; font-weight: 800; color: #f8fafc; letter-spacing: 1px; }
    .header-text h1 span { color: #dc2626; }
    .header-text p { font-size: 9px; color: #475569; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
    .settings-btn {
      margin-left: auto; background: none; border: 1px solid #1e1e2e;
      border-radius: 4px; color: #475569; cursor: pointer; padding: 4px 8px;
      font-size: 14px; line-height: 1;
    }
    .settings-btn:hover { color: #94a3b8; border-color: #334155; }
    #view-main, #view-settings, #view-result { padding: 16px; }
    .hidden { display: none !important; }
    .settings-label { font-size: 10px; color: #475569; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .settings-input {
      width: 100%; background: #0f0f1a; border: 1px solid #1e1e2e; border-radius: 6px;
      color: #cbd5e1; font-family: 'Courier New', monospace; font-size: 12px; padding: 9px 12px; outline: none;
    }
    .settings-input:focus { border-color: #3b82f6; }
    .settings-hint { font-size: 10px; color: #374151; margin-top: 6px; line-height: 1.5; }
    .settings-hint a { color: #3b82f6; text-decoration: none; }
    textarea {
      width: 100%; min-height: 100px; background: #0f0f1a;
      border: 1px solid #1e1e2e; border-radius: 6px;
      color: #cbd5e1; font-family: 'Courier New', monospace; font-size: 12px;
      padding: 10px; outline: none; resize: vertical; line-height: 1.6;
    }
    textarea:focus { border-color: #334155; }
    textarea::placeholder { color: #374151; }
    .btn-row { display: flex; gap: 8px; margin-top: 10px; }
    .btn {
      flex: 1; padding: 10px; border: none; border-radius: 6px;
      font-family: 'Courier New', monospace; font-size: 11px; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .btn-extract { background: #0f1f3a; border: 1px solid #1e3a5f; color: #3b82f6; }
    .btn-extract:hover { background: #162a4a; }
    .btn-decode { background: linear-gradient(135deg, #dc2626, #991b1b); color: #fff; }
    .btn-decode:hover { opacity: 0.9; }
    .btn-decode:disabled { background: #1e1e2e; color: #374151; cursor: not-allowed; }
    .btn-back { background: #0f0f1a; border: 1px solid #1e1e2e; color: #64748b; }
    .btn-back:hover { color: #94a3b8; }
    .btn-save { background: #1a2e1a; border: 1px solid #14532d; color: #86efac; }
    .btn-save:hover { background: #1e3a1e; }
    .status { font-size: 10px; color: #475569; letter-spacing: 1px; margin-bottom: 8px; min-height: 14px; }
    .status.ok { color: #4ade80; }
    .status.err { color: #f87171; }
    .loading-wrap { text-align: center; padding: 24px 0; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #1e1e2e; border-top-color: #dc2626;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    .loading-step { font-size: 11px; color: #64748b; letter-spacing: 1px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .score-row {
      display: flex; align-items: center; gap: 16px;
      background: #0f0f1a; border: 1px solid #1e1e2e;
      border-radius: 8px; padding: 14px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .score-circle { position: relative; width: 70px; height: 70px; flex-shrink: 0; }
    .score-circle svg { position: absolute; top: 0; left: 0; }
    .score-number {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -52%);
      font-size: 20px; font-weight: 800;
    }
    .verdict { font-size: 13px; color: #e2e8f0; line-height: 1.5; font-weight: 600; }
    .danger-badge {
      display: inline-block; font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      padding: 2px 8px; border-radius: 3px; margin-top: 5px;
    }
    .section-title { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; }
    .section-title.blue { color: #3b82f6; }
    .section-title.red { color: #dc2626; }
    .summary-list, .flag-list { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .summary-item {
      display: flex; gap: 8px; align-items: flex-start;
      background: #0a0f1a; border: 1px solid #1e3a5f33;
      border-radius: 5px; padding: 8px 10px; font-size: 12px; color: #93c5fd; line-height: 1.5;
    }
    .summary-item::before { content: "→"; flex-shrink: 0; color: #3b82f6; }
    .flag-item {
      display: flex; gap: 8px; align-items: flex-start;
      background: #1a0a0a; border: 1px solid #7f1d1d33;
      border-radius: 5px; padding: 8px 10px; font-size: 12px; color: #fca5a5; line-height: 1.5;
    }
    .flag-item::before { content: "🚩"; flex-shrink: 0; }
    .no-flags {
      background: #0a1a0a; border: 1px solid #14532d44;
      border-radius: 5px; padding: 10px; text-align: center; color: #86efac; font-size: 12px;
    }
    #view-result { max-height: 500px; overflow-y: auto; }
    #view-result::-webkit-scrollbar { width: 4px; }
    #view-result::-webkit-scrollbar-track { background: #0a0a0f; }
    #view-result::-webkit-scrollbar-thumb { background: #1e1e2e; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚖️</div>
    <div class="header-text">
      <h1>T&amp;C <span>DECODER</span></h1>
      <p>Plain English · Red Flags · Danger Score</p>
    </div>
    <button class="settings-btn" id="toggle-settings" title="Settings">⚙</button>
  </div>

  <div id="view-settings" class="hidden">
    <label class="settings-label">Anthropic API Key</label>
    <input type="password" class="settings-input" id="api-key-input" placeholder="sk-ant-..." />
    <p class="settings-hint">
      Stored locally in your browser only.<br>
      Get one at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    </p>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn btn-back" id="settings-back">← Back</button>
      <button class="btn btn-save" id="settings-save">Save Key</button>
    </div>
    <div class="status" id="settings-status"></div>
  </div>

  <div id="view-main">
    <div class="status" id="main-status"></div>
    <textarea id="tc-text" placeholder="Paste T&C text here, or click 'Grab from Page'..."></textarea>
    <div class="btn-row">
      <button class="btn btn-extract" id="btn-extract">📄 Grab from Page</button>
      <button class="btn btn-decode" id="btn-decode">[ Decode ]</button>
    </div>
  </div>

  <div id="view-loading" class="hidden" style="padding:16px;">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-step" id="loading-step">Reading the fine print...</div>
    </div>
  </div>

  <div id="view-result" class="hidden"></div>

  <script src="popup.js"></script>
</body>
</html>
